name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint check
        run: uv run ruff check --force-exclude

      - name: Ruff format check
        run: uv run ruff format --force-exclude --check

      - name: MyPy type check
        run: uv run mypy backend

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit tests with coverage
        run: uv run pytest -c pyproject.toml -m "not integration" --cov --cov-report=term-missing --cov-fail-under=80 -v --tb=short
