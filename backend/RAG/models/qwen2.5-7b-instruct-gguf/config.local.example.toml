# 离线评论清洗用本地 LLM（可选）
# 用法：复制为本目录下的 config.local.toml 后按需修改。
# 注意：不要写入仓库根 .env / backend/config.py；仅 8GB 显卡同学需要。

# GGUF 文件名（相对本目录）
model_path = "Qwen2.5-7B-Instruct-Q4_K_M.gguf"

# llama.cpp 可执行文件（相对本目录）
llama_cli = "../../tools/llama.cpp/llama-cli.exe"

# llama-server（清洗脚本默认用它，避免每批重载模型；相对本目录）
llama_server = "../../tools/llama.cpp/llama-server.exe"

# 本机 HTTP 端口（仅本地回环）
server_host = "127.0.0.1"
server_port = 18080

# 上下文长度：4060 8GB 建议 4096；OOM 时改为 2048。不要用满 32K。
n_ctx = 4096

# GPU 层数：99 表示尽量全层上 GPU（Qwen2.5-7B 约 28 层）
n_gpu_layers = 99

# 最终润色生成上限（token）
n_predict = 1024

# 短增量抽取生成上限（token）——越小越快
extract_n_predict = 256

# 好评/坏评容器写满目标（汉字字符数）
target_chars = 800

# 提示词预留 token
prompt_reserve_tokens = 600
