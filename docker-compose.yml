# 本地开发基础设施：PostgreSQL + OpenSearch + Dashboards + Redis
# 启动：docker compose up -d
# 停止：docker compose down
# OpenSearch 镜像构建上下文：backend/rag/infra/opensearch（含 IK 插件 Dockerfile）
#
# Postgres 密码：tjll_dev；OpenSearch / Dashboards / Redis：Jianyan_01

services:
  db:
    image: postgres:17
    container_name: tjll-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tjll
      POSTGRES_USER: tjll
      POSTGRES_PASSWORD: tjll_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tjll -d tjll"]
      interval: 5s
      timeout: 5s
      retries: 5

  opensearch:
    build:
      context: ./backend/rag/infra/opensearch
      dockerfile: Dockerfile
    container_name: opensearch-node
    restart: unless-stopped
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Jianyan_01
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"

  dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: opensearch-dashboards
    restart: unless-stopped
    depends_on:
      - opensearch
    ports:
      - "5601:5601"
    environment:
      - 'OPENSEARCH_HOSTS=["https://opensearch-node:9200"]'
      - 'OPENSEARCH_SSL_VERIFICATIONMODE=none'
      - 'OPENSEARCH_USERNAME=admin'
      - 'OPENSEARCH_PASSWORD=Jianyan_01'

  redis:
    image: redis/redis-stack:7.4.0-v0
    container_name: tjll-redis
    restart: unless-stopped
    environment:
      - REDIS_ARGS=--requirepass Jianyan_01
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Jianyan_01", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  opensearch-data:
  redis-data:
